groups:
  - name: qph-alerts
    rules:
      # High request latency
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(qph_http_request_duration_seconds_bucket[5m])) by (le, route)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency on {{ $labels.route }}"
          description: "95th percentile request latency is above 2 seconds for route {{ $labels.route }}"

      # High error rate
      - alert: HighErrorRate
        expr: sum(rate(qph_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(qph_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5%"

      # Service down
      - alert: ServiceDown
        expr: up{job="qph-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The Question Paper Hub backend service is not responding"

      # High memory usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 512MB"
